name: Auto Review Homework

on:
  pull_request_target:
    branches: [master, feature/projects]
    types: [opened, synchronize, reopened]

jobs:
  review:
    name: Claude Agent Review
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      # 1. Checkout code bài tập của học viên
      - name: Checkout student code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: student-code
          allow-unsafe-pr-checkout: true

      # 1b. Checkout base branch (để đọc class.json mới nhất từ teacher)
      - name: Checkout base repo at base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base-code
          allow-unsafe-pr-checkout: true

      # 1c. Add labels to PR based on branch name (dynamic, no hard-coding)
      - name: Add labels to PR
        run: |
          python3 << 'EOF'
          import re
          import requests

          BRANCH = "${{ github.event.pull_request.head.ref }}"
          PR_NUMBER = ${{ github.event.pull_request.number }}
          REPO = "${{ github.repository }}"
          TOKEN = "${{ secrets.GITHUB_TOKEN }}"

          # Parse branch: either
          #   - subject/course/student/session-XX (homework)
          #   - subject/course/project/P{N}/student/gate (project)

          parts = BRANCH.split("/")
          labels = []

          if len(parts) >= 2:
              subject, course = parts[0], parts[1]
              labels = [subject, course]

              # Detect type and add appropriate label
              if len(parts) == 6 and parts[2] == "project":
                  labels.append(f"project-{parts[3]}")  # Add P1, P2, P3, P4

          # Add labels via GitHub API
          headers = {
              "Authorization": f"token {TOKEN}",
              "Accept": "application/vnd.github.v3+json"
          }

          url = f"https://api.github.com/repos/{REPO}/issues/{PR_NUMBER}/labels"
          response = requests.post(url, headers=headers, json={"labels": labels})

          if response.status_code == 200:
              print(f"✅ PR #{PR_NUMBER}: Added labels {labels}")
          else:
              print(f"❌ Failed: {response.text}")
              exit(1)
          EOF

      # 2. Setup SSH để clone private repo
      - name: Setup SSH Deploy Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.REVIEWER_DEPLOY_KEY }}

      # 3. Clone private repo chứa agent + skills
      - name: Checkout private reviewer repo
        run: git clone git@github.com:${{ secrets.REVIEWER_REPO }} reviewer-core

      # 4. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic requests --break-system-packages

      # 5. Chạy Claude Agent review
      - name: Run Review Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          PR_REPO:           ${{ github.repository }}
          PR_BRANCH:         ${{ github.event.pull_request.head.ref }}
          PR_AUTHOR:         ${{ github.event.pull_request.user.login }}
          PR_TITLE:          ${{ github.event.pull_request.title }}
          STUDENT_CODE_PATH: student-code
          BASE_CODE_PATH:    base-code
        run: python reviewer-core/reviewer/review_pr.py
